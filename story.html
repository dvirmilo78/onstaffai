<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnStaffAI - Lottie Story</title>
  
  <!-- Lottie Player Library -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&family=Heebo:wght@400;700;800&display=swap');

    :root {
      --bg: #030303; --ink: #ffffff; --ink-dim: #555555;
      --accent: #3b82f6; --butter: #fcd34d; --sky: #38bdf8;
      --rose: #fb7185; --mint: #34d399; --violet: #a78bfa;
      --lime: #a3e635;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: 'Heebo', sans-serif;
      overflow: hidden; display: flex; justify-content: center; align-items: center;
      height: 100vh; width: 100vw;
    }

    /* Container */
    .animation-container {
      position: relative;
      width: 100%; max-width: 1000px; aspect-ratio: 16/9;
      background: radial-gradient(circle at center, #1a1a1a 0%, #030303 80%);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* Typography */
    .text-overlay {
      position: absolute; top: 8%; width: 100%; text-align: center;
      z-index: 20; padding: 0 2rem;
    }
    .text-overlay h1 {
      font-size: 3rem; font-weight: 800; line-height: 1.2;
      opacity: 0; transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: absolute; width: 100%; left: 0;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }
    
    /* Scene Texts */
    body.scene-1 #txt-1 { opacity: 1; transform: translateY(0); }
    body.scene-2 #txt-2 { opacity: 1; transform: translateY(0); }
    body.scene-3 #txt-3 { opacity: 1; transform: translateY(0); }

    /* Lottie Scenes */
    .lottie-scene {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 10;
    }
    
    /* Center the lottie player nicely */
    lottie-player {
      width: 70%;
      height: 70%;
      margin-top: 10%; /* push down below text */
    }

    /* Activations */
    body.scene-1 #lottie-s1 { opacity: 1; transform: scale(1); }
    body.scene-2 #lottie-s2 { opacity: 1; transform: scale(1); }
    body.scene-3 #lottie-s3 { opacity: 1; transform: scale(1); }

    /* Scene 2 specifically needs a glow effect */
    #lottie-s2 lottie-player {
      filter: drop-shadow(0 0 40px rgba(59, 130, 246, 0.5));
    }

    /* Progress bar */
    .progress-bar {
      position: absolute; bottom: 0; left: 0; height: 6px; background: var(--accent);
      width: 0%; transition: width 0.1s linear; z-index: 100;
      box-shadow: 0 0 10px var(--accent);
    }
    
    /* Instructional overlay for the user (only visible if paused or before recording) */
    .instructions {
      position: absolute; bottom: 20px; right: 20px;
      font-size: 0.8rem; color: #666; font-family: monospace;
      text-align: right; z-index: 100;
    }
  </style>
</head>
<body class="scene-1">

  <div class="animation-container">
    <div class="progress-bar" id="progress"></div>
    
    <div class="text-overlay">
      <h1 id="txt-1">קורס תחת העומס של<br>משימות היום-יום?</h1>
      <h1 id="txt-2">צוות של 12 סוכני AI מומחים<br>לוקח פיקוד ברגע.</h1>
      <h1 id="txt-3">זמן להתרווח עם קפה טוב,<br>ולהתפנות למה שבאמת חשוב.</h1>
    </div>

    <!-- 
      ==== LOTTIE URL INSTRUCTIONS ====
      To replace these animations with your own downloaded from LottieFiles.com:
      1. Go to LottieFiles.com and find an animation you like.
      2. Click on it and look for "Asset Link" or "Lottie Animation URL".
      3. Paste that URL into the `src="..."` attribute below.
    -->

    <!-- Scene 1: The Struggle (Stressed worker / Error / Overload) -->
    <div class="lottie-scene" id="lottie-s1">
      <lottie-player 
        src="https://assets2.lottiefiles.com/packages/lf20_0s6cgqi6.json" 
        background="transparent" speed="1" loop autoplay>
      </lottie-player>
    </div>

    <!-- Scene 2: The Solution (AI / Brain / Tech / Connect) -->
    <div class="lottie-scene" id="lottie-s2">
      <lottie-player 
        src="https://assets10.lottiefiles.com/packages/lf20_hzgq1xci.json" 
        background="transparent" speed="1" loop autoplay>
      </lottie-player>
    </div>

    <!-- Scene 3: The Relief (Coffee / Relax / Graph going up) -->
    <div class="lottie-scene" id="lottie-s3">
      <lottie-player 
        src="https://assets8.lottiefiles.com/packages/lf20_q4hixvzv.json" 
        background="transparent" speed="1" loop autoplay>
      </lottie-player>
    </div>
    
    <div class="instructions">
      // כדי להחליף את האנימציות:<br>
      // ערוך את קובץ story.html<br>
      // והכנס קישורים משלך ל-src
    </div>

  </div>

  <script>
    const totalDuration = 24000; // 24 seconds total video length
    const timeline = [
      { time: 0, class: 'scene-1' },     // Scene 1 starts at 0s
      { time: 8000, class: 'scene-2' },  // Scene 2 starts at 8s
      { time: 16000, class: 'scene-3' }  // Scene 3 starts at 16s
    ];

    const body = document.body;
    const progressBar = document.getElementById('progress');
    const startTime = performance.now();

    // Fade out instructions after 3 seconds so they don't ruin the recording
    setTimeout(() => {
      document.querySelector('.instructions').style.opacity = '0';
      document.querySelector('.instructions').style.transition = 'opacity 1s';
    }, 3000);

    function loop(now) {
      const elapsed = now - startTime;
      
      // Update progress bar
      progressBar.style.width = Math.min((elapsed / totalDuration) * 100, 100) + '%';

      // Determine current scene
      let currentClass = 'scene-1';
      for (let i = timeline.length - 1; i >= 0; i--) {
        if (elapsed >= timeline[i].time) {
          currentClass = timeline[i].class;
          break;
        }
      }

      // Apply scene class if changed
      if (body.className !== currentClass) {
        body.className = currentClass;
      }

      if (elapsed < totalDuration) {
        requestAnimationFrame(loop);
      } else {
        // Animation finished - you can reset or stop here
        // If we want it to loop continuously:
        // startTime = performance.now(); 
        // requestAnimationFrame(loop);
      }
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
