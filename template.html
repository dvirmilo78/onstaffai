<style>
/* ---------- tokens ---------- */
:root {
  /* warm palette (default) */
  --bg: #fafaf7;
  --bg-2: #f2efe8;
  --ink: #111111;
  --ink-2: #3a3833;
  --mute: #78746b;
  --line: #e6e1d6;
  --card: #ffffff;
  --accent: #ea580c;
  --accent-2: #f59e0b;
  --accent-ink: #ffffff;
  --lime: #d4f14a;
  --violet: #6d5dfc;
  --sky: #7cc4ff;
  --mint: #a9efc5;
  --rose: #ffb3b3;
  --butter: #ffe66b;

  --r-xs: 10px;
  --r-sm: 14px;
  --r-md: 20px;
  --r-lg: 28px;
  --r-xl: 40px;

  --shadow-sm: 0 1px 0 rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.04);
  --shadow-md: 0 4px 20px rgba(0,0,0,.06), 0 1px 0 rgba(0,0,0,.04);
  --shadow-lg: 0 20px 50px rgba(0,0,0,.10);
}

[data-palette="electric"] {
  --bg: #f4f3ef;
  --bg-2: #ebe9e1;
  --ink: #0b0b12;
  --ink-2: #2a2a3a;
  --mute: #6a6a80;
  --line: #dedcd3;
  --card: #ffffff;
  --accent: #6d5dfc;
  --accent-2: #22d3ee;
  --accent-ink: #ffffff;
}

[data-palette="lime"] {
  --bg: #0f1110;
  --bg-2: #171a18;
  --ink: #f4f6f2;
  --ink-2: #cfd3c8;
  --mute: #8a8f83;
  --line: #262a26;
  --card: #1b1f1c;
  --accent: #d4f14a;
  --accent-2: #7cc4ff;
  --accent-ink: #0f1110;
}

[data-dark="true"] {
  --bg: #0c0c0a;
  --bg-2: #15140f;
  --ink: #f6f3ea;
  --ink-2: #c9c5b8;
  --mute: #8b877c;
  --line: #26241d;
  --card: #161612;
  --shadow-sm: 0 1px 0 rgba(255,255,255,.04), 0 2px 8px rgba(0,0,0,.4);
  --shadow-md: 0 4px 20px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.04);
  --shadow-lg: 0 20px 50px rgba(0,0,0,.6);
}

/* ---------- base ---------- */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Heebo", "Space Grotesk", system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 17px;
  line-height: 1.55;
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
html[lang="en"] body { font-family: "Space Grotesk", "Heebo", system-ui, sans-serif; }
h1,h2,h3,h4 { margin: 0; font-weight: 700; letter-spacing: -0.02em; text-wrap: balance; }
p { margin: 0; text-wrap: pretty; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }

.mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0; }

/* ---------- layout ---------- */
.wrap { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
@media (max-width: 720px){ .wrap { padding: 0 20px; } }

/* ---------- nav ---------- */
.nav {
  position: sticky; top: 0; z-index: 40;
  background: color-mix(in oklab, var(--bg) 85%, transparent);
  backdrop-filter: saturate(160%) blur(14px);
  border-bottom: 1px solid var(--line);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 68px; gap: 24px;
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; letter-spacing: -0.02em; }
.brand-mark { width: 30px; height: 30px; }
.nav-links { display: flex; gap: 26px; color: var(--ink-2); font-weight: 500; font-size: 15px; }
.nav-links a:hover { color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 10px; }
@media (max-width: 860px) { .nav-links { display: none; } }

.lang-toggle {
  display: inline-flex; border: 1px solid var(--line); border-radius: 999px;
  padding: 3px; background: var(--card); font-size: 13px;
}
.lang-toggle button { padding: 5px 12px; border-radius: 999px; color: var(--mute); font-weight: 600; }
.lang-toggle button.on { background: var(--ink); color: var(--bg); }

/* ---------- buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 20px; border-radius: 999px; font-weight: 600; font-size: 15px;
  transition: transform .15s ease, box-shadow .2s ease, background .2s;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--ink); color: var(--bg); }
.btn-primary:hover { background: var(--accent); color: var(--accent-ink); }
.btn-accent { background: var(--accent); color: var(--accent-ink); box-shadow: 0 6px 0 color-mix(in oklab, var(--accent) 60%, #000); }
.btn-accent:hover { transform: translateY(-1px); box-shadow: 0 7px 0 color-mix(in oklab, var(--accent) 60%, #000); }
.btn-ghost { border: 1px solid var(--line); }
.btn-ghost:hover { border-color: var(--ink); }

/* ---------- hero ---------- */
.hero { padding: 48px 0 60px; position: relative; overflow: hidden; }
.hero-grid { display: grid; grid-template-columns: 1.05fr 1fr; gap: 48px; align-items: center; }
@media (max-width: 980px) { .hero-grid { grid-template-columns: 1fr; gap: 32px; } }

.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 999px; background: var(--bg-2);
  font-size: 13px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.02em;
}
.eyebrow-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(.7); } }

.hero h1 {
  font-size: clamp(44px, 6.4vw, 84px);
  line-height: 0.95;
  letter-spacing: -0.035em;
  margin: 18px 0 20px;
  font-weight: 800;
}
html[lang="he"] .hero h1 { font-weight: 900; letter-spacing: -0.025em; }
.hero h1 .stroke {
  position: relative; display: inline-block;
}
.hero h1 .stroke::after {
  content: ""; position: absolute; inset: auto -4px 6px -4px; height: 14px;
  background: var(--accent); z-index: -1; opacity: .8; border-radius: 2px;
  transform: skew(-6deg);
}
.hero h1 .accent { color: var(--accent); }
.hero-sub {
  font-size: clamp(17px, 1.7vw, 21px);
  color: var(--ink-2); max-width: 560px; line-height: 1.5;
}
.hero-cta { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
.hero-trust {
  margin-top: 32px; display: flex; align-items: center; gap: 16px;
  color: var(--mute); font-size: 14px; flex-wrap: wrap;
}
.avatar-row { display: flex; }
.avatar-row > div {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--bg);
  margin-inline-start: -10px; background-size: cover;
}
.avatar-row > div:first-child { margin: 0; }

/* ---------- hero video ---------- */
.hero-video { position: relative; border-radius: var(--r-lg);
  background: var(--card); border: 1px solid var(--line);
  box-shadow: var(--shadow-lg);
  overflow: hidden; aspect-ratio: 5/4;
  direction: ltr;
}
.video-chrome {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 14px; border-bottom: 1px solid var(--line);
  background: var(--bg-2);
}
.video-dot { width: 10px; height: 10px; border-radius: 50%; }
.video-label { font-size: 12px; color: var(--mute); margin-inline-start: 8px; font-family: "JetBrains Mono", monospace; }
.video-live { margin-inline-start: auto; font-size: 11px; color: var(--accent); font-weight: 700; display: flex; gap: 6px; align-items: center; }
.video-live::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }

.video-stage { position: absolute; inset: 44px 0 0 0; }

/* ---------- floating side-bubbles around hero ---------- */
.hero-bubbles { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.bubble {
  position: absolute; padding: 10px 14px; background: var(--card);
  border: 1px solid var(--line); border-radius: 14px; font-size: 13px;
  box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 8px;
  animation: float 8s ease-in-out infinite;
}
.bubble .sq { width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; font-size: 12px; }
@keyframes float {
  0%,100% { transform: translateY(0) }
  50% { transform: translateY(-8px) }
}

/* ---------- metric strip ---------- */
.metric-strip {
  border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  background: var(--bg-2); padding: 28px 0;
}
.metric-strip-inner { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
@media (max-width: 780px){ .metric-strip-inner { grid-template-columns: repeat(2, 1fr); } }
.metric { display: flex; flex-direction: column; gap: 4px; }
.metric .num { font-size: clamp(28px, 3vw, 40px); font-weight: 800; letter-spacing: -0.03em; font-family: "Space Grotesk", sans-serif; }
.metric .lbl { font-size: 13px; color: var(--mute); font-weight: 500; }

/* ---------- sections ---------- */
section { padding: 96px 0; }
@media (max-width: 720px){ section { padding: 64px 0; } }
.section-head { margin-bottom: 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: end; }
@media (max-width: 780px){ .section-head { grid-template-columns: 1fr; gap: 12px; } }
.section-head h2 {
  font-size: clamp(34px, 4.4vw, 56px);
  line-height: 1.02; letter-spacing: -0.03em; font-weight: 800;
}
.section-head .tag {
  font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--mute);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; display: block;
}
.section-head p { color: var(--ink-2); font-size: 18px; max-width: 520px; }

/* ---------- agent gallery ---------- */
.agent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
@media (max-width: 960px){ .agent-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px){ .agent-grid { grid-template-columns: 1fr; } }
.agent-card {
  position: relative; border-radius: var(--r-md);
  background: var(--card); border: 1px solid var(--line);
  padding: 22px; overflow: hidden;
  transition: transform .25s ease, box-shadow .25s ease;
  cursor: pointer;
}
.agent-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.agent-illu {
  height: 160px; border-radius: var(--r-sm); margin-bottom: 16px;
  display: grid; place-items: center; position: relative; overflow: hidden;
}
.agent-card h3 { font-size: 20px; margin-bottom: 6px; letter-spacing: -0.02em; }
.agent-card p { color: var(--ink-2); font-size: 14px; line-height: 1.5; }
.agent-chip {
  position: absolute; top: 14px; right: 14px;
  z-index: 2;
  background: var(--ink); color: var(--bg);
  padding: 4px 10px; border-radius: 6px;
  font-family: "JetBrains Mono", monospace; font-size: 10px;
  font-weight: 700; letter-spacing: 0.04em;
}
html[dir="rtl"] .agent-chip { right: auto; left: 14px; }
.agent-stats {
  display: flex; gap: 14px; margin-top: 14px; padding-top: 14px;
  border-top: 1px dashed var(--line); font-size: 12px; color: var(--mute);
}
.agent-stats b { color: var(--ink); font-family: "Space Grotesk", sans-serif; font-size: 14px; }

/* ---------- how it works ---------- */
.steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; position: relative; }
@media (max-width: 900px){ .steps { grid-template-columns: repeat(2, 1fr); } }
.step {
  padding: 24px; background: var(--card); border: 1px solid var(--line);
  border-radius: var(--r-md); position: relative;
}
.step-num {
  font-family: "Space Grotesk", sans-serif; font-size: 13px; font-weight: 700;
  color: var(--accent); margin-bottom: 8px;
}
.step h3 { font-size: 20px; margin-bottom: 8px; }
.step p { font-size: 14px; color: var(--ink-2); }
.step-icon { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; margin-bottom: 16px; }

/* ---------- ROI ---------- */
.roi-wrap {
  display: grid; grid-template-columns: 1.05fr 1fr; gap: 40px;
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 40px;
}
@media (max-width: 900px){ .roi-wrap { grid-template-columns: 1fr; padding: 28px; } }
.roi-form label { display: block; font-size: 14px; color: var(--mute); margin-bottom: 6px; font-weight: 500; }
.roi-form .field { margin-bottom: 20px; }
.roi-form input[type="range"] {
  width: 100%;
  -webkit-appearance: none; appearance: none;
  height: 10px; border-radius: 999px;
  background: var(--bg-2);
  outline: none; cursor: pointer;
  border: 1px solid var(--line);
}
.roi-form input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); cursor: grab;
  border: 3px solid var(--card);
  box-shadow: 0 4px 14px rgba(217,119,87,.45);
  transition: transform .15s;
}
.roi-form input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
.roi-form input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.1); }
.roi-form input[type="range"]::-moz-range-thumb {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); cursor: grab; border: 3px solid var(--card);
  box-shadow: 0 4px 14px rgba(217,119,87,.45);
}
.roi-form .field-val {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: "Space Grotesk", sans-serif; font-weight: 600; margin-bottom: 6px;
}
.roi-form .field-val .v { font-size: 22px; }
.roi-result {
  background: var(--ink); color: var(--bg); border-radius: var(--r-md);
  padding: 32px; display: flex; flex-direction: column; justify-content: center;
  position: relative; overflow: hidden;
}
.roi-result::before {
  content: ""; position: absolute; top: -40px; inset-inline-end: -40px;
  width: 180px; height: 180px; border-radius: 50%;
  background: var(--accent); opacity: .2; filter: blur(30px);
}
.roi-num { display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px; font-size: clamp(44px, 6.2vw, 72px); font-weight: 800; letter-spacing: -0.04em; line-height: 1; font-family: "Space Grotesk", sans-serif; margin-top: 12px; }
.roi-num .roi-num-value { display: inline-block; }
.roi-num .unit { font-size: 0.4em; color: var(--accent); white-space: nowrap; }
.roi-note { font-size: 14px; opacity: .8; margin-top: 16px; }
.roi-breakdown { margin-top: 20px; display: grid; gap: 10px; }
.roi-row { display: flex; justify-content: space-between; font-size: 14px; padding: 10px 0; border-top: 1px solid rgba(255,255,255,.1); }

/* ---------- demo ---------- */
.demo-wrap {
  display: grid; grid-template-columns: 320px 1fr; gap: 0;
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--r-lg); overflow: hidden; min-height: 540px;
}
@media (max-width: 820px){ .demo-wrap { grid-template-columns: 1fr; min-height: 0; } }
.demo-sidebar { background: var(--bg-2); padding: 24px; border-inline-end: 1px solid var(--line); }
@media (max-width: 820px){ .demo-sidebar { border-inline-end: 0; border-bottom: 1px solid var(--line); } }
.demo-sidebar h4 { font-size: 13px; color: var(--mute); margin-bottom: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.demo-list { display: grid; gap: 6px; }
.demo-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--ink-2);
  transition: background .15s;
}
.demo-item:hover { background: var(--bg); }
.demo-item.on { background: var(--ink); color: var(--bg); }
.demo-item .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.demo-chat { display: flex; flex-direction: column; padding: 24px; gap: 14px; min-height: 540px; }
.msg {
  max-width: 78%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5;
  animation: msgIn .4s ease both;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
.msg.user { background: var(--bg-2); align-self: flex-end; border-bottom-inline-end: 6px; }
.msg.bot { background: var(--ink); color: var(--bg); align-self: flex-start; border-bottom-inline-start: 6px; }
.msg.bot b { color: var(--accent); }
.msg-meta { font-size: 11px; color: var(--mute); margin-top: 2px; padding: 0 4px; font-family: "JetBrains Mono", monospace; }
.msg.user + .msg-meta { align-self: flex-end; }
.demo-input {
  margin-top: auto; display: flex; gap: 8px; border: 1px solid var(--line);
  border-radius: 999px; padding: 4px 4px 4px 16px; background: var(--bg);
}
html[dir="rtl"] .demo-input { padding: 4px 16px 4px 4px; }
.demo-input input { flex: 1; border: 0; background: transparent; font: inherit; color: inherit; outline: none; }
.demo-input button {
  width: 36px; height: 36px; border-radius: 50%; background: var(--ink); color: var(--bg);
  display: grid; place-items: center;
}
.typing { display: inline-flex; gap: 4px; align-items: center; padding: 6px 0; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--bg); animation: typ 1s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes typ { 0%,100% { opacity: .2; transform: translateY(0) } 50% { opacity: 1; transform: translateY(-3px) } }

/* ---------- testimonials ---------- */
.quotes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
@media (max-width: 900px){ .quotes { grid-template-columns: 1fr; } }
.quote {
  padding: 28px; border-radius: var(--r-md); background: var(--card);
  border: 1px solid var(--line); display: flex; flex-direction: column; gap: 16px;
}
.quote .big { font-size: 60px; line-height: .8; color: var(--accent); font-family: "Space Grotesk", sans-serif; font-weight: 700; }
.quote p { font-size: 17px; color: var(--ink); }
.quote-author { display: flex; align-items: center; gap: 12px; margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line); }
.quote-author .av { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; font-weight: 700; color: var(--ink); }
.quote-author b { font-size: 15px; display: block; }
.quote-author span { font-size: 13px; color: var(--mute); }
.quote-metric {
  display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
  background: var(--bg-2); border-radius: 999px; font-size: 13px; font-weight: 600;
  color: var(--accent); width: fit-content;
}

/* ---------- pricing ---------- */
.plans { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
@media (max-width: 900px){ .plans { grid-template-columns: 1fr; } }
.plan {
  padding: 32px; border-radius: var(--r-md); background: var(--card);
  border: 1px solid var(--line); display: flex; flex-direction: column; gap: 16px;
}
.plan.featured { background: var(--ink); color: var(--bg); border-color: var(--ink); position: relative; }
.plan.featured .plan-name .badge { background: var(--accent); color: var(--accent-ink); }
.plan-name { display: flex; justify-content: space-between; align-items: center; }
.plan-name h3 { font-size: 22px; }
.plan-name .badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; background: var(--bg-2); color: var(--ink-2); font-family: "JetBrains Mono", monospace; letter-spacing: 0.05em; }
.plan .price { font-size: 56px; font-weight: 800; letter-spacing: -0.04em; font-family: "Space Grotesk", sans-serif; line-height: 1; }
.plan .price .unit { font-size: 16px; font-weight: 500; color: var(--accent); margin-inline-start: 6px; font-family: "Heebo", system-ui, sans-serif; }
.plan.featured .price .unit { color: var(--accent); }
.plan ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; font-size: 15px; }
.plan li { display: flex; gap: 10px; align-items: start; }
.plan li::before {
  content: ""; width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0; margin-top: 3px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M3 8l3 3 7-7' stroke='white' fill='none' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-size: 14px; background-position: center; background-repeat: no-repeat;
}

/* ---------- faq ---------- */
.faq-wrap { display: grid; grid-template-columns: 1fr 1.5fr; gap: 48px; align-items: start; }
@media (max-width: 900px){ .faq-wrap { grid-template-columns: 1fr; } }
.faq-list { display: grid; gap: 8px; }
.faq-item {
  border: 1px solid var(--line); border-radius: var(--r-sm); overflow: hidden; background: var(--card);
}
.faq-q {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: 20px 24px; width: 100%; text-align: start; font-size: 17px; font-weight: 600;
}
.faq-q .plus { width: 26px; height: 26px; border-radius: 50%; background: var(--bg-2); display: grid; place-items: center; font-size: 18px; color: var(--accent); flex-shrink: 0; transition: transform .2s; }
.faq-item.open .plus { transform: rotate(45deg); }
.faq-a { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
.faq-item.open .faq-a { max-height: 400px; }
.faq-a-inner { padding: 0 24px 22px; color: var(--ink-2); font-size: 15px; line-height: 1.6; }

/* ---------- cta banner ---------- */
.cta-banner {
  background: var(--ink); color: var(--bg); border-radius: var(--r-xl);
  padding: 60px; text-align: center; position: relative; overflow: hidden;
}
.cta-banner h2 { font-size: clamp(36px, 5vw, 64px); letter-spacing: -0.03em; line-height: 1; }
.cta-banner p { color: rgba(255,255,255,.75); margin: 16px auto 28px; max-width: 520px; font-size: 18px; }
.cta-banner .btn-accent { background: var(--accent); color: var(--accent-ink); box-shadow: none; }
.cta-shape {
  position: absolute; width: 260px; height: 260px; border-radius: 50%;
  background: var(--accent); opacity: .25; filter: blur(40px); pointer-events: none;
}

/* ---------- footer ---------- */
footer { border-top: 1px solid var(--line); padding: 48px 0 32px; color: var(--mute); font-size: 14px; }
.foot-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 40px; }
@media (max-width: 760px){ .foot-grid { grid-template-columns: 1fr 1fr; } }
.foot-col h5 { color: var(--ink); font-size: 14px; margin-bottom: 14px; font-weight: 600; }
.foot-col a { display: block; padding: 4px 0; }
.foot-col a:hover { color: var(--accent); }
.foot-bot { display: flex; justify-content: space-between; gap: 16px; padding-top: 24px; border-top: 1px solid var(--line); flex-wrap: wrap; }

/* ---------- tweaks panel ---------- */
.tweaks-panel {
  position: fixed; bottom: 20px; inset-inline-end: 20px; z-index: 100;
  background: var(--card); border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 18px; width: 280px; box-shadow: var(--shadow-lg);
  font-size: 13px;
}
.tweaks-panel h5 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--mute); margin-bottom: 10px; font-weight: 700; font-family: "JetBrains Mono", monospace; }
.tweaks-panel .row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.tweaks-panel .chip {
  padding: 6px 10px; border-radius: 8px; background: var(--bg-2); font-size: 12px; font-weight: 600;
}
.tweaks-panel .chip.on { background: var(--ink); color: var(--bg); }
.tweaks-close { position: absolute; top: 10px; inset-inline-end: 10px; width: 24px; height: 24px; border-radius: 50%; background: var(--bg-2); display: grid; place-items: center; }

/* ---------- svg hero animation ---------- */
.anim-flow-path { stroke-dasharray: 6 8; animation: dash 3s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -28; } }
.chart-reveal-rect { animation: chartReveal 4.5s ease-out infinite; transform-origin: left center; }
@keyframes chartReveal {
  0% { transform: scaleX(0); }
  70%, 100% { transform: scaleX(1); }
}
.bar-grow { transform: scaleY(0); animation: barGrow 0.8s cubic-bezier(.2,.8,.2,1) forwards; }
@keyframes barGrow { to { transform: scaleY(1); } }
@keyframes dash { to { stroke-dashoffset: -28; } }
.anim-chart-bar { transform-origin: bottom; animation: grow 2.4s ease-in-out infinite; }
@keyframes grow { 0%,100% { transform: scaleY(.3) } 50% { transform: scaleY(1) } }
.orbit { animation: orbit 14s linear infinite; transform-origin: center; }
@keyframes orbit { to { transform: rotate(360deg) } }
.orbit-rev { animation: orbit 18s linear infinite reverse; transform-origin: center; }
.counter { animation: count 4s ease-in-out infinite; }
@keyframes count { 0%,100% { opacity: 1 } 50% { opacity: .4 } }
.blink { animation: blink 1.2s steps(2) infinite; }
@keyframes blink { to { opacity: 0 } }
.wiggle { animation: wiggle 4s ease-in-out infinite; transform-origin: center; }
@keyframes wiggle { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }

.pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
@keyframes pulseDot { 0%,100% { transform: scale(1); opacity: 1 } 50% { transform: scale(1.5); opacity: .6 } }

.clock-rotate { animation: clockRot 8s linear infinite; }
@keyframes clockRot { to { transform: rotate(360deg) } }

.pie-spin { animation: pieSpin 12s linear infinite; }
@keyframes pieSpin { to { transform: rotate(360deg) } }

.line-draw { animation: lineDraw 3s ease-out infinite; }
@keyframes lineDraw { 0% { stroke-dashoffset: 300 } 60%, 100% { stroke-dashoffset: 0 } }

.hr-check { animation: hrCheck 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
@keyframes hrCheck { 0%, 100% { transform: translateY(0) } 50% { transform: translateY(-4px) } }

.hr-bar { animation: hrBar 3s ease-out infinite; transform-origin: left; }
